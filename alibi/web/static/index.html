// Analytics Dashboard
// ============================================================
async function renderAnalytics() {
  setLoading('analytics-content');

  var summary, subscriptions;
  try {
    var results = await Promise.all([
      apiGet('/api/v1/analytics/spending-summary'),
      apiGet('/api/v1/analytics/subscriptions')
    ]);
    summary = results[0];
    subscriptions = results[1];
  } catch(e) {
    setHtml('analytics-content', '<div class="loading-state" style="color:var(--danger)">' + escHtml(e.message) + '</div>');
    showToast(e.message, 'error');
    return;
  }

  if (!summary) return;

  var html = buildAnalyticsStats(summary)
    + buildCategoryBreakdown(summary)
    + buildTopVendors(summary)
    + buildSubscriptionsCard(subscriptions);

  setHtml('analytics-content', html);
}

function buildAnalyticsStats(summary) {
  var totalSpent = summary.total_spent != null ? Number(summary.total_spent).toFixed(2) : '0.00';
  var txCount = summary.transaction_count || 0;
  var avgBasket = summary.avg_basket_size != null ? Number(summary.avg_basket_size).toFixed(2) : '0.00';
  var topCurrency = summary.top_currency || '—';

  return '<div class="stats-grid">'
    + statCard('Total Spent', escHtml(totalSpent), 'current month')
    + statCard('Transactions', txCount, '')
    + statCard('Avg Basket', escHtml(avgBasket), '')
    + statCard('Top Currency', escHtml(topCurrency), '')
    + '</div>';
}

function buildCategoryBreakdown(summary) {
  var categories = (summary.by_category || []);
  if (categories.length === 0) {
    return '<div class="card" style="margin-bottom:20px"><div class="card-header"><span class="card-title">Category Breakdown</span></div>'
      + '<div class="card-body"><div class="empty-state"><p>No spending data available. Process some documents first.</p>'
      + '<button class="empty-action" onclick="navigate(\'upload\')">Go to Upload</button></div></div></div>';
  }

  var maxAmount = 0;
  categories.forEach(function(c) {
    var amt = Math.abs(Number(c.total || c.amount || 0));
    if (amt > maxAmount) maxAmount = amt;
  });

  var barsHtml = categories.map(function(c) {
    var amt = Math.abs(Number(c.total || c.amount || 0));
    var pct = maxAmount > 0 ? (amt / maxAmount * 100) : 0;
    return '<div class="bar-row">'
      + '<div class="bar-label" title="' + escHtml(c.category || c.name || '—') + '">' + escHtml(c.category || c.name || '—') + '</div>'
      + '<div class="bar-track"><div class="bar-fill" style="width:' + pct.toFixed(1) + '%"></div></div>'
      + '<div class="bar-amount">' + amt.toFixed(2) + '</div>'
      + '</div>';
  }).join('');

  return '<div class="card" style="margin-bottom:20px">'
    + '<div class="card-header"><span class="card-title">Category Breakdown</span></div>'
    + '<div class="card-body"><div class="bar-chart">' + barsHtml + '</div></div></div>';
}

function buildTopVendors(summary) {
  var vendors = (summary.by_vendor || []);
  if (vendors.length === 0) {
    return '<div class="card" style="margin-bottom:20px"><div class="card-header"><span class="card-title">Top Vendors</span></div>'
      + '<div class="card-body"><div class="empty-state"><p>No spending data available. Process some documents first.</p>'
      + '<button class="empty-action" onclick="navigate(\'upload\')">Go to Upload</button></div></div></div>';
  }

  var top10 = vendors.slice(0, 10);
  var rows = top10.map(function(v) {
    var total = Number(v.total || v.amount || 0).toFixed(2);
    var count = v.count || v.transaction_count || 0;
    var avg = count > 0 ? (Number(v.total || v.amount || 0) / count).toFixed(2) : '0.00';
    return '<tr>'
      + '<td><strong>' + escHtml(v.vendor || v.name || '—') + '</strong></td>'
      + '<td style="text-align:right">' + escHtml(total) + '</td>'
      + '<td style="text-align:center">' + count + '</td>'
      + '<td style="text-align:right">' + escHtml(avg) + '</td>'
      + '</tr>';
  }).join('');

  return '<div class="card" style="margin-bottom:20px">'
    + '<div class="card-header"><span class="card-title">Top Vendors</span>'
    + '<span class="badge badge-muted">top 10</span></div>'
    + '<div class="table-wrap"><table id="analytics-vendors-table">'
    + '<thead><tr>'
    + '<th class="sortable" onclick="sortTable(\'analytics-vendors-table\',0,\'string\')">Vendor<span class="sort-arrow">\u25B2</span></th>'
    + '<th class="sortable" onclick="sortTable(\'analytics-vendors-table\',1,\'number\')" style="text-align:right">Total<span class="sort-arrow">\u25B2</span></th>'
    + '<th class="sortable" onclick="sortTable(\'analytics-vendors-table\',2,\'number\')" style="text-align:center">Count<span class="sort-arrow">\u25B2</span></th>'
    + '<th class="sortable" onclick="sortTable(\'analytics-vendors-table\',3,\'number\')" style="text-align:right">Avg<span class="sort-arrow">\u25B2</span></th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table></div></div>';
}

function buildSubscriptionsCard(subscriptions) {
  var items = (subscriptions && (subscriptions.subscriptions || subscriptions)) || [];
  if (!Array.isArray(items)) items = [];

  if (items.length === 0) {
    return '<div class="card"><div class="card-header"><span class="card-title">Subscriptions</span></div>'
      + '<div class="card-body"><div class="empty-state"><p>No recurring payments detected. Process more documents to enable subscription detection.</p></div></div></div>';
  }

  var rows = items.map(function(s) {
    var amount = s.amount != null ? Number(s.amount).toFixed(2) : '—';
    var period = s.period || s.frequency || '—';
    var nextExpected = s.next_expected || s.next_date || '—';
    return '<tr>'
      + '<td><strong>' + escHtml(s.vendor || s.name || '—') + '</strong></td>'
      + '<td style="text-align:right">' + escHtml(amount) + '</td>'
      + '<td>' + escHtml(period) + '</td>'
      + '<td>' + escHtml(nextExpected) + '</td>'
      + '</tr>';
  }).join('');

  return '<div class="card">'
    + '<div class="card-header"><span class="card-title">Subscriptions</span>'
    + '<span class="badge badge-muted">' + items.length + '</span></div>'
    + '<div class="table-wrap"><table id="analytics-subs-table">'
    + '<thead><tr>'
    + '<th class="sortable" onclick="sortTable(\'analytics-subs-table\',0,\'string\')">Vendor<span class="sort-arrow">\u25B2</span></th>'
    + '<th class="sortable" onclick="sortTable(\'analytics-subs-table\',1,\'number\')" style="text-align:right">Amount<span class="sort-arrow">\u25B2</span></th>'
    + '<th>Period</th>'
    + '<th class="sortable" onclick="sortTable(\'analytics-subs-table\',3,\'date\')">Next Expected<span class="sort-arrow">\u25B2</span></th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table></div></div>';
}

// ============================================================
// Search
// ============================================================
function renderSearch() {
  var html = '<div class="search-row">'
    + '<input id="search-input" class="form-input" type="text" placeholder="Search transactions, items, documents...">'
    + '<button class="btn btn-primary" id="search-submit-btn" onclick="executeSearch()">Search</button>'
    + '</div>'
    + '<div id="search-results">'
    + '<div class="empty-state"><p>Enter a search term to find transactions, items, or documents.</p></div>'
    + '</div>';

  setHtml('search-content', html);

  var input = document.getElementById('search-input');
  if (input) {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') executeSearch();
    });
    input.focus();
  }
}

async function executeSearch() {
  var input = document.getElementById('search-input');
  var query = input ? input.value.trim() : '';
  if (!query) {
    showToast('Please enter a search term', 'error');
    return;
  }

  var resultsEl = document.getElementById('search-results');
  if (resultsEl) resultsEl.innerHTML = '<div class="loading-state"><span class="spinner spinner-lg"></span><span>Searching...</span></div>';

  try {
    var data = await apiPost('/api/v1/search', { query: query, limit: 20 });
    if (!data) return;
    setHtml('search-results', buildSearchResults(data, query));
  } catch(e) {
    setHtml('search-results', '<div class="loading-state" style="color:var(--danger)">' + escHtml(e.message) + '</div>');
    showToast(e.message, 'error');
  }
}

function buildSearchResults(data, query) {
  var transactions = data.transactions || data.facts || [];
  var items = data.items || [];
  var documents = data.documents || [];

  var hasResults = transactions.length > 0 || items.length > 0 || documents.length > 0;

  if (!hasResults) {
    var queryLabel = query ? escHtml(query) : '';
    return '<div class="empty-state">'
      + '<div class="empty-state-title">No results found' + (queryLabel ? ' for \'' + queryLabel + '\'' : '') + '</div>'
      + '<p>Try a different search term.</p>'
      + '</div>';
  }

  var html = '';

  if (transactions.length > 0) {
    var txRows = transactions.map(function(f) {
      var amount = f.total != null ? Number(f.total).toFixed(2) : (f.amount != null ? Number(f.amount).toFixed(2) : '—');
      return '<tr style="cursor:pointer" onclick="navigate(\'facts\')">'
        + '<td>' + escHtml(f.date || '—') + '</td>'
        + '<td><strong>' + escHtml(f.vendor || '—') + '</strong></td>'
        + '<td style="text-align:right">' + escHtml(amount) + '</td>'
        + '<td>' + escHtml(f.currency || '—') + '</td>'
        + '</tr>';
    }).join('');

    html += '<div class="card" style="margin-bottom:16px">'
      + '<div class="card-header"><span class="card-title">Transactions</span>'
      + '<span class="badge badge-muted">' + transactions.length + '</span></div>'
      + '<div class="table-wrap"><table><thead><tr>'
      + '<th>Date</th><th>Vendor</th><th style="text-align:right">Amount</th><th>Currency</th>'
      + '</tr></thead><tbody>' + txRows + '</tbody></table></div></div>';
  }

  if (items.length > 0) {
    var itemRows = items.map(function(item) {
      var price = item.total != null ? Number(item.total).toFixed(2) : (item.amount != null ? Number(item.amount).toFixed(2) : '—');
      return '<tr>'
        + '<td><strong>' + escHtml(item.name || '—') + '</strong></td>'
        + '<td>' + escHtml(item.vendor || '—') + '</td>'
        + '<td style="text-align:right">' + escHtml(price) + '</td>'
        + '<td>' + escHtml(item.category || '—') + '</td>'
        + '</tr>';
    }).join('');

    html += '<div class="card" style="margin-bottom:16px">'
      + '<div class="card-header"><span class="card-title">Items</span>'
      + '<span class="badge badge-muted">' + items.length + '</span></div>'
      + '<div class="table-wrap"><table><thead><tr>'
      + '<th>Name</th><th>Vendor</th><th style="text-align:right">Price</th><th>Category</th>'
      + '</tr></thead><tbody>' + itemRows + '</tbody></table></div></div>';
  }

  if (documents.length > 0) {
    var docRows = documents.map(function(doc) {
      return '<tr>'
        + '<td><strong>' + escHtml(doc.filename || doc.source || '—') + '</strong></td>'
        + '<td>' + escHtml(doc.type || doc.document_type || '—') + '</td>'
        + '<td>' + escHtml(doc.date || doc.created_at || '—') + '</td>'
        + '</tr>';
    }).join('');

    html += '<div class="card" style="margin-bottom:16px">'
      + '<div class="card-header"><span class="card-title">Documents</span>'
      + '<span class="badge badge-muted">' + documents.length + '</span></div>'
      + '<div class="table-wrap"><table><thead><tr>'
      + '<th>Filename</th><th>Type</th><th>Date</th>'
      + '</tr></thead><tbody>' + docRows + '</tbody></table></div></div>';
  }

  return html;
}
</script>
</body>
</html>
