services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull OCR model on first run:
    #   docker compose exec ollama ollama pull glm-ocr

  alibi-api:
    build: .
    ports:
      - "3100:3100"
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      - ALIBI_DB_PATH=/app/data/alibi.db
      - ALIBI_OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama

  alibi-watcher:
    build: .
    command: ["uv", "run", "lt", "process", "--watch"]
    volumes:
      - ./data:/app/data
    environment:
      - ALIBI_DB_PATH=/app/data/alibi.db
      - ALIBI_INBOX_PATH=/app/data/inbox
      - ALIBI_OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama

  # Telegram bot: runs as a separate THIN container (no DB/Ollama/pipeline).
  # It is an HTTP client of this API service, so it lives in its own compose
  # file to keep this stack DB-bound and the bot portable:
  #   docker compose -f docker-compose.telegram.yml up -d --build
  # See Dockerfile.telegram and docs/TELEGRAM_THIN_BOT_PLAN.md.

volumes:
  ollama_data:
